<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <title>AI Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ── Theme Variables ── */
    :root {
      --bg-page: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --bg-sidebar: #16161e;
      --bg-chat: #1e1e2e;
      --bg-input-area: #181825;
      --bg-input: #2a2a3c;
      --bg-bot-msg: #2a2a3c;
      --bg-code-block: #181825;
      --bg-inline-code: rgba(255, 255, 255, 0.08);
      --bg-wrapper-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.06);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-input: rgba(255, 255, 255, 0.1);
      --text-primary: #e5e7eb;
      --text-secondary: #d1d5db;
      --text-muted: #9ca3af;
      --text-faint: #6b7280;
      --text-dim: #4b5563;
      --text-strong: #f3f4f6;
      --bot-msg-border: rgba(255, 255, 255, 0.05);
      --conv-active-bg: rgba(99, 102, 241, 0.15);
      --conv-hover-bg: rgba(255, 255, 255, 0.05);
      --scrollbar-thumb: rgba(255, 255, 255, 0.12);
      --scrollbar-hover: rgba(255, 255, 255, 0.2);
      --copy-hover-bg: rgba(255, 255, 255, 0.08);
      --table-border: rgba(255, 255, 255, 0.1);
      --table-header-bg: rgba(255, 255, 255, 0.05);
    }

    [data-theme="light"] {
      --bg-page: linear-gradient(135deg, #e2e8f0 0%, #f1f5f9 100%);
      --bg-sidebar: #f8fafc;
      --bg-chat: #ffffff;
      --bg-input-area: #f1f5f9;
      --bg-input: #ffffff;
      --bg-bot-msg: #f1f5f9;
      --bg-code-block: #f1f5f9;
      --bg-inline-code: rgba(0, 0, 0, 0.06);
      --bg-wrapper-shadow: 0 4px 24px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(0, 0, 0, 0.06);
      --border-subtle: rgba(0, 0, 0, 0.08);
      --border-input: rgba(0, 0, 0, 0.15);
      --text-primary: #1f2937;
      --text-secondary: #374151;
      --text-muted: #6b7280;
      --text-faint: #9ca3af;
      --text-dim: #b0b8c4;
      --text-strong: #111827;
      --bot-msg-border: rgba(0, 0, 0, 0.06);
      --conv-active-bg: rgba(99, 102, 241, 0.1);
      --conv-hover-bg: rgba(0, 0, 0, 0.04);
      --scrollbar-thumb: rgba(0, 0, 0, 0.15);
      --scrollbar-hover: rgba(0, 0, 0, 0.25);
      --copy-hover-bg: rgba(0, 0, 0, 0.06);
      --table-border: rgba(0, 0, 0, 0.1);
      --table-header-bg: rgba(0, 0, 0, 0.04);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg-page);
      overflow: hidden;
    }

    /* ── App Wrapper ── */
    .app-wrapper {
      width: 780px;
      height: 640px;
      display: flex;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--bg-wrapper-shadow);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-subtle);
    }

    .sidebar-header {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #new-chat-btn {
      flex: 1;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      text-align: center;
    }

    #new-chat-btn:hover {
      opacity: 0.85;
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .conversation-list::-webkit-scrollbar {
      width: 4px;
    }

    .conversation-list::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 2px;
    }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 0.82rem;
      text-align: left;
      width: 100%;
      font-family: inherit;
    }

    .conv-item:hover {
      background: var(--conv-hover-bg);
      color: var(--text-secondary);
    }

    .conv-item.active {
      background: var(--conv-active-bg);
      color: var(--text-primary);
    }

    .conv-item-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conv-delete {
      background: none;
      border: none;
      color: var(--text-faint);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .conv-item:hover .conv-delete {
      opacity: 1;
    }

    .conv-delete:hover {
      color: #f87171;
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border-subtle);
      font-size: 0.7rem;
      color: var(--text-dim);
      text-align: center;
    }

    /* ── Mobile sidebar toggle ── */
    .sidebar-toggle {
      display: none;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* ── Theme Toggle ── */
    .theme-toggle {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: opacity 0.2s;
    }

    .theme-toggle:hover {
      opacity: 0.8;
    }

    /* ── Chat Container ── */
    .chat-container {
      flex: 1;
      background: var(--bg-chat);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      color: #fff;
      padding: 18px 24px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header::before {
      content: '';
      width: 10px;
      height: 10px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 6px #4ade80;
    }

    .header-title {
      flex: 1;
    }

    /* ── Chat Window ── */
    .chat-window {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--bg-chat);
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    .chat-window::-webkit-scrollbar {
      width: 6px;
    }

    .chat-window::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-window::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 3px;
    }

    .chat-window::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-hover);
    }

    /* ── Messages ── */
    .message {
      max-width: 78%;
      padding: 12px 16px;
      line-height: 1.5;
      font-size: 0.92rem;
      position: relative;
      animation: fadeIn 0.25s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* AI / Bot messages — left-aligned, gray bubble */
    .message.bot {
      align-self: flex-start;
      background: var(--bg-bot-msg);
      color: var(--text-secondary);
      border-radius: 4px 16px 16px 16px;
      border: 1px solid var(--bot-msg-border);
    }

    /* User messages — right-aligned, blue bubble */
    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #fff;
      border-radius: 16px 4px 16px 16px;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.35);
    }

    /* ── Input Area ── */
    .chat-input-area {
      display: flex;
      padding: 14px 16px;
      border-top: 1px solid var(--border-subtle);
      gap: 10px;
      background: var(--bg-input-area);
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-input);
      border-radius: 10px;
      font-size: 0.92rem;
      outline: none;
      background: var(--bg-input);
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: none;
      overflow-y: auto;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.4;
      font-family: inherit;
    }

    #user-input::placeholder {
      color: var(--text-faint);
    }

    #user-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
    }

    #send-btn {
      padding: 12px 22px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    #send-btn:hover {
      opacity: 0.9;
    }

    #send-btn:active {
      transform: scale(0.96);
    }

    /* ── Attach Button ── */
    .attach-btn {
      background: none;
      border: 1px solid var(--border-input);
      color: var(--text-muted);
      font-size: 1.25rem;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 10px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      line-height: 1;
      flex-shrink: 0;
    }

    .attach-btn:hover {
      color: var(--text-primary);
      border-color: #2563eb;
      background: rgba(37, 99, 235, 0.08);
    }

    /* ── File Preview Strip ── */
    .file-preview-strip {
      display: none;
      padding: 8px 16px 0;
      background: var(--bg-input-area);
      gap: 8px;
      flex-wrap: wrap;
    }

    .file-preview-strip.has-files {
      display: flex;
    }

    .file-preview-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border-subtle);
      background: var(--bg-input);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      max-width: 200px;
    }

    .file-preview-item img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .file-preview-item .file-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .file-preview-item .file-name {
      font-size: 0.75rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-preview-remove {
      position: absolute;
      top: 2px;
      right: 2px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 0.65rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .file-preview-remove:hover {
      background: rgba(239, 68, 68, 0.8);
    }

    /* ── Attached images in messages ── */
    .message-attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .message-attachments img {
      max-width: 220px;
      max-height: 180px;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .message-attachments img:hover {
      opacity: 0.85;
    }

    .message-attachments .pdf-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      border-radius: 6px;
      background: var(--bg-inline-code);
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    /* ── Markdown inside bot messages ── */
    .message.bot p {
      margin: 0 0 8px;
    }

    .message.bot p:last-child {
      margin-bottom: 0;
    }

    .message.bot ul,
    .message.bot ol {
      margin: 6px 0;
      padding-left: 20px;
    }

    .message.bot code {
      background: var(--bg-inline-code);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.85em;
    }

    .message.bot pre {
      background: var(--bg-code-block);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .message.bot pre code {
      background: none;
      padding: 0;
      font-size: 0.85em;
    }

    .message.bot strong {
      color: var(--text-strong);
    }

    .message.bot a {
      color: #60a5fa;
      text-decoration: underline;
    }

    .message.bot blockquote {
      border-left: 3px solid #6366f1;
      padding-left: 12px;
      margin: 8px 0;
      color: var(--text-muted);
    }

    .message.bot table {
      border-collapse: collapse;
      margin: 8px 0;
      width: 100%;
    }

    .message.bot th,
    .message.bot td {
      border: 1px solid var(--table-border);
      padding: 6px 10px;
      text-align: left;
    }

    .message.bot th {
      background: var(--table-header-bg);
    }

    /* ── Typing Indicator ── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--text-faint);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Timestamps ── */
    .message-wrapper {
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.25s ease-out;
    }

    .message-wrapper.user-wrapper {
      align-items: flex-end;
    }

    .message-wrapper.bot-wrapper {
      align-items: flex-start;
    }

    .timestamp {
      font-size: 0.7rem;
      color: var(--text-faint);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* ── Copy Button ── */
    .copy-btn {
      background: none;
      border: none;
      color: var(--text-faint);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      margin-left: 8px;
    }

    .copy-btn:hover {
      color: var(--text-secondary);
      background: var(--copy-hover-bg);
    }

    .copy-btn.copied {
      color: #4ade80;
    }

    .bot-footer {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    /* ── Retry Button ── */
    .retry-btn {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      margin-left: 8px;
      transition: background 0.2s;
    }

    .retry-btn:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    .continue-btn {
      background: rgba(99, 102, 241, 0.15);
      color: #818cf8;
      border: 1px solid rgba(99, 102, 241, 0.3);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      margin-left: 8px;
      transition: background 0.2s;
    }

    .continue-btn:hover {
      background: rgba(99, 102, 241, 0.25);
    }

    .continue-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .error-text {
      color: #f87171;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      body {
        align-items: stretch;
        background: var(--bg-chat);
      }

      .app-wrapper {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        height: var(--vh, 100dvh);
        border-radius: 0;
        box-shadow: none;
        position: relative;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: -280px;
        width: 280px;
        height: 100vh;
        height: 100dvh;
        z-index: 100;
        transition: left 0.25s ease;
        box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
      }

      .sidebar.open {
        left: 0;
      }

      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 99;
      }

      .sidebar-overlay.open {
        display: block;
      }

      .sidebar-toggle {
        display: block;
      }

      .chat-container {
        width: 100%;
      }

      header {
        padding: 14px 16px;
        font-size: 1rem;
      }

      .chat-window {
        padding: 14px;
        gap: 10px;
      }

      .message {
        max-width: 88%;
        padding: 10px 14px;
        font-size: 0.88rem;
      }

      .chat-input-area {
        padding: 10px 12px;
        gap: 8px;
      }

      #user-input {
        padding: 10px 14px;
        font-size: 0.88rem;
        min-height: 40px;
      }

      #send-btn {
        padding: 10px 16px;
        font-size: 0.88rem;
      }
    }

    @media (min-width: 641px) and (max-width: 840px) {
      .app-wrapper {
        width: 95vw;
        height: 90vh;
      }

      .sidebar {
        width: 220px;
      }
    }
  </style>
</head>
<body>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-wrapper">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button id="new-chat-btn">+ New Chat</button>
      </div>
      <div class="conversation-list" id="conversation-list"></div>
      <div class="sidebar-footer">Powered by Gemini</div>
    </aside>

    <main class="chat-container">
      <header>
        <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
        <span class="header-title">AI Chatbot</span>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">☾</button>
      </header>

    <section class="chat-window" id="chat-window" aria-live="polite">
    </section>

    <div class="file-preview-strip" id="file-preview-strip"></div>
    <form class="chat-input-area" id="chat-form">
      <input type="file" id="file-input" multiple accept="image/png,image/jpeg,image/gif,image/webp,application/pdf" hidden>
      <button type="button" class="attach-btn" id="attach-btn" title="Attach image or PDF">📎</button>
      <label for="user-input" class="sr-only"></label>
      <textarea
        id="user-input"
        placeholder="Type your message here..."
        autocomplete="off"
        rows="1"
      ></textarea>
      <button type="submit" id="send-btn">Send</button>
    </form>
    </main>
  </div>

  <script>
    // Guard: must be served via the Express server, not opened as a file
    if (location.protocol === 'file:') {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#f87171;font-family:sans-serif;text-align:center;padding:2rem"><div><h2>⚠️ Cannot open directly</h2><p>Run <code>npm start</code> and visit <strong>http://localhost:3000</strong></p></div></div>';
      throw new Error('Page must be served via http://localhost:3000');
    }

    const API_URL = '/api/chat';

    const chatWindow = document.getElementById('chat-window');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const newChatBtn = document.getElementById('new-chat-btn');
    const convListEl = document.getElementById('conversation-list');
    const sidebarEl = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    const sidebarToggle = document.getElementById('sidebar-toggle');
    const themeToggle = document.getElementById('theme-toggle');
    const fileInput = document.getElementById('file-input');
    const attachBtn = document.getElementById('attach-btn');
    const filePreviewStrip = document.getElementById('file-preview-strip');

    const STORAGE_KEY = 'chatbot_conversations';
    const ACTIVE_KEY = 'chatbot_active_id';

    let conversations = {};  // { id: { title, messages[], history[] } }
    let activeId = null;
    let pendingFiles = [];  // { name, mimeType, base64, dataUrl }

    // ── Theme ──
    function loadTheme() {
      const saved = localStorage.getItem('chatbot_theme');
      if (saved === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        themeToggle.textContent = '☀';
      } else {
        document.documentElement.removeAttribute('data-theme');
        themeToggle.textContent = '☾';
      }
    }

    themeToggle.addEventListener('click', () => {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      if (isLight) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('chatbot_theme', 'dark');
        themeToggle.textContent = '☾';
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('chatbot_theme', 'light');
        themeToggle.textContent = '☀';
      }
    });

    // Configure marked
    marked.setOptions({ breaks: true, gfm: true });

    // ── ID generator ──
    function newId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    // ── Persistence ──
    function saveAll() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
      localStorage.setItem(ACTIVE_KEY, activeId);
    }

    function loadAll() {
      try {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (data && typeof data === 'object') conversations = data;
      } catch { /* ignore */ }
      activeId = localStorage.getItem(ACTIVE_KEY);

      // Migrate old single-chat format
      const old = localStorage.getItem('chatbot_history');
      if (old && Object.keys(conversations).length === 0) {
        try {
          const parsed = JSON.parse(old);
          if (parsed?.chatMessages?.length) {
            const id = newId();
            const title = parsed.chatMessages.find(m => m.sender === 'user')?.text?.slice(0, 40) || 'Imported Chat';
            conversations[id] = {
              title,
              messages: parsed.chatMessages,
              history: parsed.conversationHistory || []
            };
            activeId = id;
            localStorage.removeItem('chatbot_history');
          }
        } catch { /* ignore */ }
      }
    }

    // ── Sidebar rendering ──
    function renderSidebar() {
      convListEl.innerHTML = '';
      const ids = Object.keys(conversations).sort((a, b) => {
        // Most recent first (IDs start with timestamp)
        return b.localeCompare(a);
      });

      ids.forEach(id => {
        const conv = conversations[id];
        const item = document.createElement('button');
        item.classList.add('conv-item');
        if (id === activeId) item.classList.add('active');

        const textSpan = document.createElement('span');
        textSpan.classList.add('conv-item-text');
        textSpan.textContent = conv.title || 'New Chat';

        const delBtn = document.createElement('button');
        delBtn.classList.add('conv-delete');
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteConversation(id);
        });

        item.appendChild(textSpan);
        item.appendChild(delBtn);
        item.addEventListener('click', () => switchConversation(id));
        convListEl.appendChild(item);
      });
    }

    // ── Switch conversation ──
    function switchConversation(id) {
      if (id === activeId) return;
      activeId = id;
      saveAll();
      renderSidebar();
      renderActiveChat();
      closeSidebar();
      userInput.focus();
    }

    // ── Delete conversation ──
    function deleteConversation(id) {
      delete conversations[id];
      if (id === activeId) {
        const remaining = Object.keys(conversations);
        if (remaining.length > 0) {
          activeId = remaining.sort((a, b) => b.localeCompare(a))[0];
        } else {
          createNewChat();
          return;
        }
      }
      saveAll();
      renderSidebar();
      renderActiveChat();
    }

    // ── Create new chat ──
    function createNewChat() {
      const id = newId();
      conversations[id] = { title: 'New Chat', messages: [], history: [] };
      activeId = id;
      saveAll();
      renderSidebar();
      renderActiveChat();
      closeSidebar();
      userInput.focus();
    }

    // ── Render active chat ──
    function renderActiveChat() {
      chatWindow.innerHTML = '';
      const conv = conversations[activeId];
      if (!conv) return;

      if (conv.messages.length === 0) {
        renderMessage("Hello! I'm your AI assistant. How can I help you today?", 'bot', getTimestamp(), false);
      } else {
        conv.messages.forEach(m => renderMessage(m.text, m.sender, m.time, false, m.attachments || []));
      }
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // ── Mobile sidebar ──
    function openSidebar() {
      sidebarEl.classList.add('open');
      sidebarOverlay.classList.add('open');
    }

    function closeSidebar() {
      sidebarEl.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    }

    sidebarToggle.addEventListener('click', openSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);

    // ── Timestamp ──
    function getTimestamp() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // ── Copy button ──
    function createCopyBtn(rawText) {
      const btn = document.createElement('button');
      btn.classList.add('copy-btn');
      btn.textContent = '⎘ Copy';
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(rawText).then(() => {
          btn.textContent = '✓ Copied';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = '⎘ Copy'; btn.classList.remove('copied'); }, 1500);
        });
      });
      return btn;
    }

    // ── Render a message to the DOM ──
    function renderMessage(text, sender, time, save = true, attachments = []) {
      const wrapper = document.createElement('div');
      wrapper.classList.add('message-wrapper', sender === 'user' ? 'user-wrapper' : 'bot-wrapper');

      // Show attached images/files above the message text
      if (attachments.length > 0) {
        const attDiv = document.createElement('div');
        attDiv.classList.add('message-attachments');
        attachments.forEach(att => {
          if (att.mimeType.startsWith('image/') && att.dataUrl) {
            const img = document.createElement('img');
            img.src = att.dataUrl;
            img.alt = att.name;
            img.addEventListener('click', () => window.open(att.dataUrl, '_blank'));
            attDiv.appendChild(img);
          } else {
            const badge = document.createElement('span');
            badge.classList.add('pdf-badge');
            badge.textContent = '📄 ' + att.name;
            attDiv.appendChild(badge);
          }
        });
        wrapper.appendChild(attDiv);
      }

      const msg = document.createElement('div');
      msg.classList.add('message', sender);
      if (sender === 'bot') {
        msg.innerHTML = DOMPurify.sanitize(marked.parse(text));
      } else {
        msg.textContent = text;
      }

      wrapper.appendChild(msg);

      if (sender === 'bot') {
        const footer = document.createElement('div');
        footer.classList.add('bot-footer');
        const ts = document.createElement('span');
        ts.classList.add('timestamp');
        ts.textContent = time;
        footer.appendChild(ts);
        footer.appendChild(createCopyBtn(text));
        wrapper.appendChild(footer);
      } else {
        const ts = document.createElement('span');
        ts.classList.add('timestamp');
        ts.textContent = time;
        wrapper.appendChild(ts);
      }

      chatWindow.appendChild(wrapper);
      chatWindow.scrollTop = chatWindow.scrollHeight;

      if (save) {
        const conv = conversations[activeId];
        // Store attachment metadata (keep dataUrl for images so they render on reload)
        const attMeta = attachments.map(a => ({ name: a.name, mimeType: a.mimeType, dataUrl: a.dataUrl || null }));
        conv.messages.push({ sender, text, time, attachments: attMeta.length ? attMeta : undefined });

        // Update title from first user message
        if (sender === 'user' && conv.title === 'New Chat') {
          conv.title = text.slice(0, 40) + (text.length > 40 ? '...' : '');
          renderSidebar();
        }

        saveAll();
      }

      return msg;
    }

    // ── File handling ──
    attachBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      for (const file of fileInput.files) {
        if (pendingFiles.length >= 5) break; // max 5 files per message
        const reader = new FileReader();
        reader.onload = () => {
          const base64Full = reader.result; // data:mime;base64,...
          const base64Data = base64Full.split(',')[1];
          pendingFiles.push({
            name: file.name,
            mimeType: file.type,
            base64: base64Data,
            dataUrl: file.type.startsWith('image/') ? base64Full : null
          });
          renderFilePreview();
        };
        reader.readAsDataURL(file);
      }
      fileInput.value = ''; // reset so same file can be re-added
    });

    function renderFilePreview() {
      filePreviewStrip.innerHTML = '';
      if (pendingFiles.length === 0) {
        filePreviewStrip.classList.remove('has-files');
        return;
      }
      filePreviewStrip.classList.add('has-files');
      pendingFiles.forEach((f, i) => {
        const item = document.createElement('div');
        item.classList.add('file-preview-item');

        if (f.dataUrl) {
          const img = document.createElement('img');
          img.src = f.dataUrl;
          img.alt = f.name;
          item.appendChild(img);
        } else {
          const icon = document.createElement('span');
          icon.classList.add('file-icon');
          icon.textContent = '📄';
          item.appendChild(icon);
        }

        const nameSpan = document.createElement('span');
        nameSpan.classList.add('file-name');
        nameSpan.textContent = f.name;
        item.appendChild(nameSpan);

        const removeBtn = document.createElement('button');
        removeBtn.classList.add('file-preview-remove');
        removeBtn.textContent = '✕';
        removeBtn.addEventListener('click', () => {
          pendingFiles.splice(i, 1);
          renderFilePreview();
        });
        item.appendChild(removeBtn);

        filePreviewStrip.appendChild(item);
      });
    }

    // ── API call ──
    async function getAIResponse(userText, files = []) {
      const conv = conversations[activeId];

      // Build parts array: text + inline file data
      const parts = [];
      if (userText) parts.push({ text: userText });
      files.forEach(f => {
        parts.push({ inlineData: { mimeType: f.mimeType, data: f.base64 } });
      });

      conv.history.push({ role: 'user', parts });

      const wrapper = document.createElement('div');
      wrapper.classList.add('message-wrapper', 'bot-wrapper');

      const thinkingMsg = document.createElement('div');
      thinkingMsg.classList.add('message', 'bot', 'typing-indicator');
      thinkingMsg.innerHTML = '<span></span><span></span><span></span>';

      wrapper.appendChild(thinkingMsg);
      chatWindow.appendChild(wrapper);
      chatWindow.scrollTop = chatWindow.scrollHeight;

      const time = getTimestamp();

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: conv.history }),
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || `API error ${response.status}`);
        }

        const data = await response.json();
        const aiText =
          data.candidates?.[0]?.content?.parts?.[0]?.text
          || 'Sorry, I could not generate a response.';
        const finishReason = data.candidates?.[0]?.finishReason;

        conv.history.push({ role: 'model', parts: [{ text: aiText }] });

        // Strip inlineData from history to avoid bloating localStorage
        const userEntry = conv.history[conv.history.length - 2];
        if (userEntry && userEntry.role === 'user') {
          userEntry.parts = userEntry.parts.filter(p => !p.inlineData);
          if (userEntry.parts.length === 0) userEntry.parts = [{ text: '(attached files)' }];
        }

        thinkingMsg.classList.remove('typing-indicator');
        thinkingMsg.innerHTML = DOMPurify.sanitize(marked.parse(aiText));

        const footer = document.createElement('div');
        footer.classList.add('bot-footer');
        const ts = document.createElement('span');
        ts.classList.add('timestamp');
        ts.textContent = time;
        footer.appendChild(ts);
        footer.appendChild(createCopyBtn(aiText));

        // If response was truncated, show a Continue button
        if (finishReason === 'MAX_TOKENS') {
          const continueBtn = document.createElement('button');
          continueBtn.classList.add('continue-btn');
          continueBtn.textContent = 'Continue ↗';
          continueBtn.addEventListener('click', () => {
            continueBtn.disabled = true;
            continueBtn.textContent = 'Continuing…';
            continueResponse(conv, thinkingMsg, wrapper, footer, continueBtn);
          });
          footer.appendChild(continueBtn);
        }

        wrapper.appendChild(footer);

        conv.messages.push({ sender: 'bot', text: aiText, time });
        saveAll();
      } catch (error) {
        conv.history.pop();

        thinkingMsg.classList.remove('typing-indicator');
        thinkingMsg.classList.add('error-text');
        thinkingMsg.textContent = `Error: ${error.message}`;

        const footer = document.createElement('div');
        footer.classList.add('bot-footer');
        const ts = document.createElement('span');
        ts.classList.add('timestamp');
        ts.textContent = time;
        footer.appendChild(ts);

        const retryBtn = document.createElement('button');
        retryBtn.classList.add('retry-btn');
        retryBtn.textContent = '↻ Retry';
        retryBtn.addEventListener('click', () => {
          wrapper.remove();
          getAIResponse(userText, files);
        });
        footer.appendChild(retryBtn);
        wrapper.appendChild(footer);
      }

      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // ── Continue truncated response ──
    async function continueResponse(conv, msgEl, wrapper, footer, continueBtn) {
      // Ask the model to continue from where it left off
      conv.history.push({ role: 'user', parts: [{ text: 'Please continue from where you left off.' }] });

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: conv.history }),
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || `API error ${response.status}`);
        }

        const data = await response.json();
        const contText =
          data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        const finishReason = data.candidates?.[0]?.finishReason;

        conv.history.push({ role: 'model', parts: [{ text: contText }] });

        // Append the continuation to the existing message
        const lastMsg = conv.messages[conv.messages.length - 1];
        lastMsg.text += contText;

        // Re-render the full combined text
        msgEl.innerHTML = DOMPurify.sanitize(marked.parse(lastMsg.text));

        // Update the copy button to copy the full text
        const oldCopy = footer.querySelector('.copy-btn');
        if (oldCopy) oldCopy.replaceWith(createCopyBtn(lastMsg.text));

        // Remove the used continue button
        continueBtn.remove();

        // If still truncated, add a new continue button
        if (finishReason === 'MAX_TOKENS') {
          const newContinueBtn = document.createElement('button');
          newContinueBtn.classList.add('continue-btn');
          newContinueBtn.textContent = 'Continue ↗';
          newContinueBtn.addEventListener('click', () => {
            newContinueBtn.disabled = true;
            newContinueBtn.textContent = 'Continuing…';
            continueResponse(conv, msgEl, wrapper, footer, newContinueBtn);
          });
          footer.appendChild(newContinueBtn);
        }

        saveAll();
      } catch (error) {
        conv.history.pop(); // remove the "continue" user message
        continueBtn.textContent = 'Continue ↗';
        continueBtn.disabled = false;
      }

      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // ── New Chat button ──
    newChatBtn.addEventListener('click', createNewChat);

    // ── Auto-resize textarea ──
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    // Enter sends, Shift+Enter adds new line
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        chatForm.requestSubmit();
      }
    });

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = userInput.value.trim();
      if (!text && pendingFiles.length === 0) return;

      // Grab pending files and clear them
      const files = [...pendingFiles];
      pendingFiles = [];
      renderFilePreview();

      // Build attachment metadata for display
      const attachments = files.map(f => ({ name: f.name, mimeType: f.mimeType, dataUrl: f.dataUrl }));

      renderMessage(text || '(attached files)', 'user', getTimestamp(), true, attachments);
      userInput.value = '';
      userInput.style.height = 'auto';
      getAIResponse(text, files);
    });

    // ── Initialize ──
    loadTheme();
    loadAll();
    if (!activeId || !conversations[activeId]) {
      if (Object.keys(conversations).length > 0) {
        activeId = Object.keys(conversations).sort((a, b) => b.localeCompare(a))[0];
      } else {
        createNewChat();
      }
    }
    renderSidebar();
    renderActiveChat();

    // Mobile: keep layout fitted when virtual keyboard opens
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        document.documentElement.style.setProperty('--vh', window.visualViewport.height + 'px');
      });
      document.documentElement.style.setProperty('--vh', window.visualViewport.height + 'px');
    }
  </script>

</body>
</html>
